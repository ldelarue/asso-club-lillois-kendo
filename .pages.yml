settings:
  commit:
    identity: user
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"
media:
  - name: media
    label: media
    input: public/uploads
    output: /uploads
  - name: website
    input: public/resources
    output: /web-resources
content:
  - name: dojo
    label: Le Dojo
    type: file
    path: src/content/dojo.md
    view:
      fields: [ name ]
    fields:
      - { name: name, label: Nom, type: string, required: false }
      - { name: body-1, label: section-1, type: rich-text, required: false }
      - { name: side-image, label: Illustration, type: image, required: false }
      - { name: body-2, label: section-2, type: rich-text, required: false }
      - { name: body-3, label: section-3, type: rich-text, required: false }
      - { name: body, label: bodyi, type: rich-text, required: false }
  - name: disciplines
    label: Sections
    type: collection
    path: src/content/disciplines
    view:
      fields: [ name, draft ]
    fields:
      - { name: name, label: Nom, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: logo, label: Logo, type: image }
      - { name: summary, label: Description, type: string }
      - { name: contact, label: Contact, type: string }
      - { name: schedule, label: Horaires, type: string }
      - { name: body, label: Contenu, type: rich-text }
      - { name: draft, label: Brouillon, type: boolean }
  - name: sign-up
    label: Inscriptions
    type: file
    path: src/_data/resources.json
    fields:
      - name: pdf
        label: >
          Sélectionner le PDF d'inscription
        type: file
        options:
          path: downloads
          extensions: [pdf]
  - name: brochure
    label: Brochure
    type: file
    path: src/_data/brochure.json
    fields:
      - name: pdf
        label: Select PDF
        type: file
        options:
          extensions: [pdf]
          path: documents
  - name: events
    label: Événements
    type: collection
    path: src/content/events
    view:
      fields: [ title, pubDatetime ]
    fields:
      - { name: title, label: Titre, type: string, required: true }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Date, type: date }
      - { name: slug, label: Slug, type: string }
      - { name: draft, label: Brouillon, type: boolean }
      - { name: description, label: Description, type: string }
      - { name: body, label: Contenu, type: rich-text }
  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    view:
      fields: [ title, draft, pubDatetime ]
    fields:
      - { name: author, label: Auteur, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Date, type: date }
      - { name: title, label: Titre, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: draft, label: Brouillon, type: boolean }
      - { name: tags, label: Étiquettes, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Contenu, type: rich-text }
  - name: about
    label: À propos
    type: file
    path: src/pages/about.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - { name: title, label: Titre, type: string }
      - { name: body, label: Contenu, type: rich-text, options: { input: public/assets, output: /assets } }